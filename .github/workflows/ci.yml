name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6  # verify latest stable + SHA-pin at setup time
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

      # Guard: server-only secret must never be referenced from app/ code.
      - name: Guard service-role key out of app/
        run: |
          if grep -rn "SERVICE_ROLE" app/ ; then
            echo "::error::service-role reference found in app/ — keep it in lib/"; exit 1
          fi

      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-time-placeholder
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: build-time-placeholder

      # Guard: the (placeholder) service-role value must not be inlined in the bundle.
      - name: Guard secret out of client bundle
        run: |
          if grep -rn "build-time-placeholder" .next/static 2>/dev/null ; then
            echo "::error::a server env value leaked into the client bundle"; exit 1
          fi

      # Unit + boundary tests. The RLS/invite-gate integration tests
      # (tests/rls/*, tests/auth/*) self-skip without SUPABASE_TEST_* env — they
      # are validated against the real Supabase project (see docs), not in
      # per-push CI, which would require provisioning a full Supabase stack
      # (CLI + Docker + config.toml) on every run.
      - run: pnpm test
