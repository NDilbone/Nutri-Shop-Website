name: RLS Integration Tests

# The per-push CI workflow runs unit/boundary tests only. This workflow spins up
# a real local Supabase stack and runs the RLS isolation + invite-gate guardrail
# tests fail-closed — proving cross-user data cannot leak. Kept separate because
# the Supabase stack (CLI + Docker) is slow to provision.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "tests/rls/**"
      - "tests/auth/**"
      - "lib/dal/**"
      - "lib/supabase/**"
      - ".github/workflows/rls.yml"

permissions:
  contents: read

jobs:
  rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase + apply migrations
        run: |
          [ -f supabase/config.toml ] || supabase init
          # Phase 6B's live MFA test (and the feature itself) requires TOTP MFA, which
          # `supabase init` disables by default. Ensure the section exists, enable only
          # the TOTP factor (phone/webauthn stay off), then assert it took so a future
          # config-schema change fails loudly here, not as an opaque "MFA enroll is disabled".
          grep -q '^\[auth.mfa.totp\]' supabase/config.toml \
            || printf '\n[auth.mfa.totp]\nenroll_enabled = false\nverify_enabled = false\n' >> supabase/config.toml
          sed -i -E '/^\[auth\.mfa\.totp\]/,/^\[/ s/^( *enroll_enabled *=).*/\1 true/' supabase/config.toml
          sed -i -E '/^\[auth\.mfa\.totp\]/,/^\[/ s/^( *verify_enabled *=).*/\1 true/' supabase/config.toml
          sed -n '/^\[auth\.mfa\.totp\]/,/^\[/p' supabase/config.toml | grep -q 'enroll_enabled *= *true' \
            || { echo "::error::failed to enable TOTP MFA in supabase/config.toml"; exit 1; }
          supabase start
          supabase db reset --no-seed

      - name: Export local Supabase creds (anchored parse; values may contain '=')
        run: |
          supabase status -o env > /tmp/supa.env
          API_URL=$(grep '^API_URL=' /tmp/supa.env | cut -d= -f2- | tr -d '"')
          ANON=$(grep '^ANON_KEY=' /tmp/supa.env | cut -d= -f2- | tr -d '"')
          SERVICE=$(grep '^SERVICE_ROLE_KEY=' /tmp/supa.env | cut -d= -f2- | tr -d '"')
          test -n "$API_URL" && test -n "$ANON" && test -n "$SERVICE" \
            || { echo "::error::failed to parse Supabase creds"; cat /tmp/supa.env; exit 1; }
          {
            echo "SUPABASE_TEST_URL=$API_URL"
            echo "SUPABASE_TEST_ANON_KEY=$ANON"
            echo "SUPABASE_TEST_SERVICE_ROLE_KEY=$SERVICE"
          } >> "$GITHUB_ENV"

      - name: Wait for the local auth service to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf -o /dev/null "http://127.0.0.1:54321/auth/v1/health" && { echo "auth ready"; exit 0; }
            sleep 2
          done
          echo "::warning::auth health not confirmed after 40s; proceeding anyway"

      # --no-file-parallelism serializes the suites so concurrent admin.createUser
      # calls don't overwhelm the freshly-started local GoTrue (AuthRetryableFetchError).
      - name: Run RLS + invite-gate integration tests (fail-closed, serialized)
        run: pnpm exec vitest run tests/rls tests/auth/invite-gate.test.ts --no-file-parallelism
        env:
          REQUIRE_SUPABASE_TESTS: "1"

      - name: Dump auth (GoTrue) logs on failure
        if: failure()
        run: |
          echo "=== containers ===" ; docker ps --format '{{.Names}}' || true
          echo "=== auth logs ===" ; docker logs "$(docker ps -aqf name=supabase_auth)" 2>&1 | tail -80 || true

      - name: Stop local Supabase
        if: always()
        run: supabase stop || true
